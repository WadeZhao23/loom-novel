# Loom 项目配置

[backend]
provider = "deepseek"     # deepseek | claude | codex | openai_compat
model    = "deepseek-v4-flash"   # DeepSeek V4(旧名 deepseek-chat/reasoner 2026-07-24 停用)
# openai_compat(接智谱GLM/Moonshot/Qwen/硅基流动等)时再填这家的接口地址,例:
# base_url = "https://open.bigmodel.cn/api/paas/v4"

[novel]
title = "__TITLE__"
"章节字数" = 800           # 终稿目标字数;中间工序(锚点/细纲)自然更短

[gate]
# 质检/去AI味 复审轮数:1=只挑硬伤写进 .审稿留痕/(默认,不自动改稿);≥2 才回炉重写;0=关闭
"轮数" = 1
